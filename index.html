            ENCRYPTED_PAYLOAD_BASE64 !== "REPLACE_ME_WITH_BASE64_PAYLOAD"
                ? ENCRYPTED_PAYLOAD_BASE64.match(/.{1,80}/g).join('\n')
                : "No encrypted payload found. Please generate one.";

        function base64ToUint8Array(base64) {
            const binaryString = window.atob(base64);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes;
        }

        async function decryptContent(password, payloadBase64) {
            try {
                const payloadStr = new TextDecoder().decode(base64ToUint8Array(payloadBase64));
                const payload = JSON.parse(payloadStr);
                const salt = new Uint8Array(payload.salt);
                const iv = new Uint8Array(payload.iv);
                const data = new Uint8Array(payload.data);
                const enc = new TextEncoder();
                const keyMaterial = await window.crypto.subtle.importKey(
                    "raw",
                    enc.encode(password),
                    { name: "PBKDF2" },
                    false,
                    ["deriveBits", "deriveKey"]
                );
                const key = await window.crypto.subtle.deriveKey(
                    {
                        name: "PBKDF2",
                        salt: salt,
                        iterations: 250000,
                        hash: "SHA-256"
                    },
                    keyMaterial,
                    { name: "AES-GCM", length: 256 },
                    true,
                    ["decrypt"]
                );
                const decryptedBuffer = await window.crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: iv },
                    key,
                    data
                );
                return new TextDecoder().decode(decryptedBuffer);
            } catch (e) {
                console.error("Decryption failed.", e);
                return null;
            }
        }

        document.getElementById('fab').addEventListener('click', async () => {
            if (!window.crypto || !window.crypto.subtle) {
                alert("Error: Web Crypto API is not available.");
                return;
            }

            const password = prompt("Enter decryption password:");
            if (!password) return;

            const plaintext = await decryptContent(password, ENCRYPTED_PAYLOAD_BASE64);

            if (plaintext) {
                const contentEl = document.getElementById('content');
                const range = document.createRange();
                range.selectNode(contentEl);
                contentEl.innerHTML = "";
                const fragment = range.createContextualFragment(plaintext);
                contentEl.appendChild(fragment);
                document.getElementById('fab').style.display = 'none';
                document.body.classList.add('decrypted');
            } else {
                alert("Incorrect password or corrupted data.");
            }
        });
